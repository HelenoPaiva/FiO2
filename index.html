<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FiO2 Calculator</title>
<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(180deg, #0b132b, #0f172a);
    color: white;
    margin: 0;
    padding: 20px;
}
h1 {
    text-align: center;
    margin-bottom: 10px;
    font-weight: 500;
}
.repo {
    text-align: center;
    margin-bottom: 20px;
    font-size: 14px;
    opacity: 0.8;
}
.repo a {
    color: #60a5fa;
    text-decoration: none;
}
.card {
    background: #1e293b;
    border-radius: 18px;
    padding: 18px;
    margin-bottom: 18px;
    box-shadow: 0 6px 25px rgba(0,0,0,0.3);
}
.section-title {
    font-size: 14px;
    opacity: 0.7;
    margin-bottom: 10px;
}
.input-row {
    display: flex;
    gap: 10px;
}
.input-box {
    flex: 1;
}
label {
    font-size: 12px;
    opacity: 0.6;
    margin-bottom: 4px;
    display: block;
}
input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-size: 18px;
    background: #0b132b;
    color: white;
    box-sizing: border-box;
}
.result {
    font-size: 24px;
    font-weight: 600;
    text-align: center;
    margin-top: 12px;
    min-height: 32px;
}
</style>
</head>
<body>

<h1>FiO2 Calculator</h1>
<div class="repo">
    <a href="https://github.com/HelenoPaiva/FiO2" target="_blank">github.com/HelenoPaiva/FiO2</a>
</div>

<div class="card">
    <div class="section-title">Air + O2 → FiO2</div>
    <div class="input-row">
        <div class="input-box">
            <label>Air (L/min)</label>
            <input id="air" inputmode="decimal" oninput="updateAll()">
        </div>
        <div class="input-box">
            <label>O2 (L/min)</label>
            <input id="o2" inputmode="decimal" oninput="updateAll()">
        </div>
    </div>
    <div class="result" id="fio2Result">—</div>
</div>

<div class="card">
    <div class="section-title">Total Flow + FiO2 → Flows</div>
    <div class="input-row">
        <div class="input-box">
            <label>Total (L/min)</label>
            <input id="total" inputmode="decimal" oninput="updateAll()">
        </div>
        <div class="input-box">
            <label>FiO2</label>
            <input id="targetFiO2" inputmode="decimal" oninput="updateAll()">
        </div>
    </div>
    <div class="result" id="flowResult">—</div>
</div>

<script>
function parseValue(v){
    if(!v) return NaN;
    v = v.replace(',', '.');
    let n = Number(v);
    return isFinite(n) ? n : NaN;
}

function updateAll(){
    let air = parseValue(document.getElementById("air").value);
    let o2 = parseValue(document.getElementById("o2").value);

    let total = (isFinite(air)?air:0) + (isFinite(o2)?o2:0);

    if(total > 0){
        let fio2 = ((isFinite(o2)?o2:0) + 0.21*(isFinite(air)?air:0)) / total;
        document.getElementById("fio2Result").innerText =
            fio2.toFixed(2) + " (" + Math.round(fio2*100) + "%)";
    } else {
        document.getElementById("fio2Result").innerText = "—";
    }

    let t = parseValue(document.getElementById("total").value);
    let f = parseValue(document.getElementById("targetFiO2").value);

    if(isFinite(t) && isFinite(f) && t>0 && f>=0.21 && f<=1){
        let o = t*(f-0.21)/0.79;
        let a = t-o;
        document.getElementById("flowResult").innerText =
            "O2 " + o.toFixed(2) + " | Air " + a.toFixed(2);
    } else {
        document.getElementById("flowResult").innerText = "—";
    }
}
</script>

</body>
</html>
